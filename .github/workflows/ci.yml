name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  docker:
    name: Build & Push Docker Image
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set short image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-deploy:
    name: Notify Deploy Webhook
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Set short image tag
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"
      - name: Notify server to pull image
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL is empty; skipping webhook notification"
            exit 0
          fi
          auth_header=()
          if [ -n "$DEPLOY_WEBHOOK_TOKEN" ]; then
            auth_header=(-H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN")
          fi
          curl --fail --show-error --silent \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            "${auth_header[@]}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"ghcr.io/${{ github.repository }}\",\"tag\":\"${{ env.SHORT_SHA }}\",\"sha\":\"${{ github.sha }}\"}"
