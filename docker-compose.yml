services:
  redis:
    image: redis:7-alpine
    container_name: live-auction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: live-auction-mysql
    environment:
      MYSQL_DATABASE: live_auction
      MYSQL_USER: live_auction
      MYSQL_PASSWORD: live_auction
      MYSQL_ROOT_PASSWORD: live_auction_root
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ulive_auction", "-plive_auction"]
      interval: 5s
      timeout: 3s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./deploy/observability/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:v2.53.0
    command: ["--config.file=/etc/prometheus/prometheus.yaml"]
    volumes:
      - ./deploy/observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki.yaml"]
    volumes:
      - ./deploy/observability/loki.yaml:/etc/loki.yaml:ro
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.1.0
    command: ["-config.file=/etc/promtail.yaml"]
    volumes:
      - ./deploy/observability/promtail-local.yaml:/etc/promtail.yaml:ro
      - ./logs:/var/log/live-auction:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    volumes:
      - ./deploy/observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/observability/grafana/dashboards/dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/dashboard-provider.yaml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  mysql-data:
  redis-data:
