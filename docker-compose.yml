services:
  redis:
    image: redis:7-alpine
    container_name: live-auction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: live-auction-mysql
    environment:
      MYSQL_DATABASE: live_auction
      MYSQL_USER: live_auction
      MYSQL_PASSWORD: live_auction
      MYSQL_ROOT_PASSWORD: live_auction_root
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ulive_auction", "-plive_auction"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
  redis-data:
