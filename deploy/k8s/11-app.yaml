apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-auction-backend
  namespace: live-auction
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: live-auction-backend
  template:
    metadata:
      labels:
        app: live-auction-backend
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.4
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: password
          command:
            - sh
            - -c
            - |
              until mysqladmin ping -h mysql -u live_auction -p$MYSQL_PASSWORD --silent; do
                echo "waiting for mysql..."
                sleep 3
              done
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              if redis-cli -h redis ping | grep -q PONG; then
                echo "redis reachable"
              else
                echo "redis unavailable at startup; backend will use availability control plane"
              fi
      containers:
        - name: app
          image: ghcr.io/zet-plane/live-auction-backend:latest
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.instance.id=$(POD_UID),k8s.pod.name=$(POD_NAME),k8s.namespace.name=live-auction,k8s.deployment.name=live-auction-backend
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: availability-state
              mountPath: /availability
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          secret:
            secretName: app-config
        - name: availability-state
          hostPath:
            path: /var/lib/live-auction/availability
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: live-auction-backend
  namespace: live-auction
spec:
  selector:
    app: live-auction-backend
  ports:
    - port: 8080
      targetPort: 8080
