apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-auction-backend
  namespace: live-auction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: live-auction-backend
  template:
    metadata:
      labels:
        app: live-auction-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.4
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: password
          command:
            - sh
            - -c
            - |
              until mysqladmin ping -h mysql -u live_auction -p$MYSQL_PASSWORD --silent; do
                echo "waiting for mysql..."
                sleep 3
              done
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h redis ping | grep -q PONG; do
                echo "waiting for redis..."
                sleep 2
              done
      containers:
        - name: app
          image: ghcr.io/zet-plane/live-auction-backend:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          secret:
            secretName: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: live-auction-backend
  namespace: live-auction
spec:
  selector:
    app: live-auction-backend
  ports:
    - port: 8080
      targetPort: 8080
