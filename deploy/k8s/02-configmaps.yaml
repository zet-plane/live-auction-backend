apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: live-auction
data:
  otel-collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: live-auction
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-live-auction
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-live-auction
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: live-auction
roleRef:
  kind: ClusterRole
  name: prometheus-live-auction
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: live-auction
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8889"]

      - job_name: kube-state-metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: [live-auction]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app]
            regex: kube-state-metrics
            action: keep

      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: [live-auction]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app]
            regex: node-exporter
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: metrics
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_pod_host_ip]
            target_label: host_ip
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: live-auction
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: live-auction
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: live-auction
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: live-auction-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [live-auction]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: live-auction-backend
            action: keep
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            regex: "(.+);(.+)"
            target_label: __path__
            replacement: /var/log/pods/live-auction_*_${1}/${2}/*.log
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - target_label: service_name
            replacement: live-auction-backend
          - target_label: environment
            replacement: production
        pipeline_stages:
          - cri: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: live-auction
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
  loki.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: Loki
        type: loki
        access: proxy
        url: http://loki:3100
  tempo.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        uid: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: Loki
            filterByTraceID: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: live-auction
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: live-auction
        orgId: 1
        folder: Live Auction
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
