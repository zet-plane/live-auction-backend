apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: live-auction
stringData:
  password: "CHANGE_ME_MYSQL_PASSWORD"
  root-password: "CHANGE_ME_MYSQL_ROOT_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-config
  namespace: live-auction
stringData:
  config.yaml: |
    mode: release
    app:
      name: live-auction-backend
      version: 0.1.0
    http:
      host: 0.0.0.0
      port: "8080"
    database:
      driver: mysql
      dsn: live_auction:CHANGE_ME_MYSQL_PASSWORD@tcp(mysql:3306)/live_auction?charset=utf8mb4&parseTime=True&loc=Local
      max_idle_conns: 5
      max_open_conns: 20
      conn_max_lifetime: 30m
    redis:
      addr: redis:6379
      password: ""
      db: 0
    auth:
      token_secret: CHANGE_ME_AUTH_TOKEN_SECRET
      token_ttl: 24h
    security:
      allowed_origins:
        - "*"
    auction:
      extend_trigger_sec: 30
      auto_extend_sec: 10
      max_extend_count: 6
      max_total_extend_sec: 300
    observability:
      enabled: true
      service_name: live-auction-backend
      service_version: 0.1.0
      environment: production
      otlp_endpoint: otel-collector:4317
      otlp_insecure: true
      trace_sample_ratio: 0.1
      metrics_interval: 15s
      logs:
        format: json
        output: stdout
        include_trace_context: true
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: live-auction
stringData:
  password: "CHANGE_ME_GRAFANA_ADMIN_PASSWORD"
